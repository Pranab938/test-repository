name: 05 - contexts
run-name: 05-contexts | DEBUG - ${{ inputs.debug }}
on: 
    push:
    workflow_dispatch:
        inputs: 
            debug:
                type: boolean
                default: false
jobs:
    echo-data:
        runs-on: ubuntu-latest
        env:
            MY_WORKFLOW_VAR: 'environment variable workflow 1'
            MY_OVERWRITTEN_VAR: 'environment variable overwritten 1' 
        steps:
            - name: Display information
              run: | 
                    echo "Event name: ${{github.event_name}}"
                    echo "Ref: ${{github.ref }}"
                    echo "SHA: ${{github.sha }}"  
                    echo "Actor: ${{github.actor }}"
                    echo "Workflow: ${{github.workflow }}"
                    echo "Run ID: ${{github.run_id }}"
                    echo "Run number: ${{github.run_number }}"
            - name: Retrieve Variable 
              run: |
                    echo "Variable value: ${{ vars.MY_VAR }}"
            - name: Print Env Variables
              env: 
                MY_OVERWRITTEN_VAR: "overwritten in print env step" 
              run: |
                    echo "Variable value: ${{env.MY_WORKFLOW_VAR}}"
                    echo "Variable value: ${{env.MY_OVERWRITTEN_VAR}}"
    echo-data2:
        runs-on: ubuntu-latest
        steps:
            - name: Print ENV variables 
              run: | 
                    echo "Variable value: $MY_WORKFLOW_VAR }}"
                    echo "Variable value: $MY_OVERWRITTEN_VAR }}"