name: 11 - Working with output

on: 
    workflow_dispatch:
        inputs: 
            build-status:
                type: choice
                options:
                    - success
                    - failure
                default: success
                
jobs:
    Build:
        runs-on: ubuntu-latest
        outputs: 
            build-status: ${{ steps.build.outputs.status }}
        steps:
            - name: Print GITHUB_OUTPUT path
              run: echo "$GITHUB_OUTPUT"
            - name: Build
              id: build
              run: echo "status=success" >> "$GITHUB_OUTPUT"
    Deploy:
        runs-on: ubuntu-latest
        needs: Build
        if: ${{ needs.Build.outputs.build-status == 'success' }}
        steps:
            - name: Deploy
              run: echo "Deploy"