name: 00 - Execution control pipeline

on: 
    push:
    workflow_dispatch:
        inputs: 
            pass-unit-tests:
                type: boolean
                description: Whether unit test will pass or not 
                default: true
    pull_request:
env:
    WORKFLOW_VAR: "I am a job var"
jobs:
    lint-build:
        runs-on: ubuntu-latest
        steps:
            - name: Lint and build
              run: echo "Linting and building project"
    unit-test:
        runs-on: ubuntu-latest
        steps:
            - name: Running unit test
              run: echo "Running unit tests...."
            - name: Failing tests
              if: ${{ !inputs.pass-unit-tests }}
              run: exit 1
    deploy-nonprod:
        runs-on: ubuntu-latest
        needs:
            - lint-build
            - unit-test
        steps:
            - name: Deploying to nonprod
              run: echo "deploying to nonprod....."
    e2e-test:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps: 
            - name: Running E2E tests
              run: echo "Running E2E tests....."
    load-tests:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps: 
            - name: Running load tests      
              run: echo "Running load tests......."    
    deploy-prod:
        runs-on: ubuntu-latest
        needs:
            - load-tests
            - e2e-test
        steps: 
            - name: Running load tests      
              run: echo "Running deploy Job to prod..........."    