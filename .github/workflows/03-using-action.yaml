name: 03 - Using Action Workflow

on: 
  push:
  pull_request:
  workflow_dispatch:
jobs:
    build: 
      runs-on: ubuntu-latest
      steps:
          - name: Checkout Code 
            uses: actions/checkout@v4
          - name: Printing Folders 
            run: ls
          - name: Setup node 
            uses: actions/setup-node@v3
            with: 
              node-version: '20.x'
          - name: Install dependencies
            run: |
               cd
               npm ci
            working-directory: app-dir/react-app
            