name: 02 - Event Workflow

on: 
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
    echo-hello:
      runs-on: ubuntu-latest
      steps:
        - name: Show the trigger
          run: echo "Triggered by a(n) ${{ github.event_name }} event."
    