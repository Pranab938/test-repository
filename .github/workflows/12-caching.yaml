name: 11 - Working with Caching

on: 
    workflow_dispatch:
        inputs: 
            use-cache:
                type: boolean
                description: Whether ot execute cache step
                default: true
                
jobs:
    Build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 13-caching/react-app
        steps:
            #1. Checkout of code 
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Setup node
              uses: actions/setup-node@v3
              with:
                node-version: '20.x'

            #2. Install dependencies 
            - name: Install dependencies
              run: npm ci
            
            #3. Linting, formatting, unit testing, building 
            - name: Testing
              run: npm run test
            - name: Building 
              run: npm run build
            
            #4. Deploy to nonprod
            - name: Deploy to nonprod
              run: echo "Deploying to nonprod....." 
        