name: 10 - Working with inputs

on: 
    push:
    workflow_dispatch:
        inputs: 
            dry-run:
                type: boolean
                description: Skip deployment and only build output 
                default: false
            target:
                type: environment 
                required: true 
                description: Which environment the workflow will target
            tag:
                type: choice
                options:
                    - v1
                    - v2 
                    - v3
                default: v3 
                
    pull_request:
env:
    WORKFLOW_VAR: "I am a job var"
jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Build
              run: echo "Building from tag ${{ inputs.tag }}"
    Deploy:
        runs-on: ubuntu-latest
        environment: ${{ inputs.target }}
        steps:
            - name: Deploy
              run: echo "Deploying to ${{ inputs.target}}"
            - name: Failing tests
              if: ${{ !inputs.pass-unit-tests }}
              run: exit 1
    deploy-nonprod:
        runs-on: ubuntu-latest
        needs:
            - lint-build
            - unit-test
        steps:
            - name: Deploying to nonprod
              run: echo "deploying to nonprod....."
    e2e-test:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps: 
            - name: Running E2E tests
              run: echo "Running E2E tests....."
    load-tests:
        runs-on: ubuntu-latest
        needs:
            - deploy-nonprod
        steps: 
            - name: Running load tests      
              run: echo "Running load tests......."    
    deploy-prod:
        runs-on: ubuntu-latest
        needs:
            - load-tests
            - e2e-test
        steps: 
            - name: Running load tests      
              run: echo "Running deploy Job to prod..........."    