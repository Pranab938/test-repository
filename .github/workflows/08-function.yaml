name: 08 - Using Functions

on: 
    push:
    workflow_dispatch:
        inputs: 
            debug:
                type: boolean
                default: false
env:
    WORKFLOW_VAR: "I am a job var"
jobs:
    echo:
        runs-on: ubuntu-latest
        steps:
            - name: Failing step
              run: exit 1
            - name: I will be skipped 
              if: ${{ success() }}
              run: echo "I will print if previous steps succeed"
            - name: I will execute 
              if: ${{ failure() }}
              run: echo "I will print, if previous step fails"
            - name: I will execute
              if: ${{ !cancelled() }}
              run: echo "I will always print, except when the workflow is cancelled"
            - name: I will execute when cancelled
              if: ${{ cancelled() }}
              run: echo "I will only print if workflow is cancelled"
